<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/shared/layout.css" />
  <link rel="stylesheet" href="/admin/admin.css?v=3" />
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">💌 Date Proposal Admin</div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to manage responses and special dates.</p>

    <label class="login-label" for="email">Email</label>
    <input class="login-input" id="email" type="email" placeholder="admin@example.com" autocomplete="username" />

    <label class="login-label" for="password">Password</label>
    <input class="login-input" id="password" type="password" placeholder="Password" autocomplete="current-password" />

    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign in</button>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>
<script>
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('login-msg');
  if (!email || !password) { msg.className='login-msg err'; msg.textContent='Please fill in both fields.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('adminToken', data.token);
    window.location.href = '/admin/admin.html';
  } catch (e) {
    msg.className = 'login-msg err'; msg.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
if (localStorage.getItem('adminToken')) window.location.href = '/admin/admin.html';
</script>
</body>
</html>
